version: "3"

# This will let taskfile know that we have these projects
includes:
  web:
    taskfile: ./apps/web/Taskfile.yml
    dir: ./apps/web

  server:
    taskfile: ./services/server/Taskfile.yml
    dir: ./services/server

  sandbox:
    taskfile: ./services/sandbox/Taskfile.yml
    dir: ./services/sandbox

  bot-fleet:
    taskfile: ./services/bot-fleet/Taskfile.yml
    dir: ./services/bot-fleet


# these are the main commands which is defined in their respective taskfiles
tasks:

  build:
    desc: Build all services
    deps:
      - web:build
      - server:build
      - sandbox:build
      - bot-fleet:build

  dev:
    desc: Start services as a development
    deps:
      - web:dev
      - server:dev
      - sandbox:dev
      - bot-fleet:dev

  test:
    desc: Test services
    deps:
      - web:test
      - server:test
      - sandbox:test
      - bot-fleet:test
    
  lint:
    desc: Format and lint services
    deps:
      - web:lint
      - server:lint
      - sandbox:lint
      - bot-fleet:lint

  start:
    desc: Start services as it would in the production
    deps:
      - web:start
      - server:start
      - sandbox:start

  lib:
    desc: Create rust library,
    cmds: 
      - cargo new libs/{{.NAME}} --lib 

  