version: '3'

tasks:

  dev:
    cmds:
      - go run ./cmd/server

  build:
    cmds:
      - go build -o bin/server ./cmd/server

  test:
    cmds:
      - go test ./...

  lint:
    cmds:
      - golangci-lint run --fix
  
  start:
    cmds:
      - go build -o bin/server ./cmd/server && ./bin/server
